general {
        output_format = "i3bar"
        colors = true
        interval = 5
}

order += "ethernet tailscale0"
order += "ethernet enp5s0"
order += "disk /"
order += "memory"
order += "load"
order += "tztime local"
order += "tztime utc"
order += "read_file uptime"

ethernet tailscale0 {
        format_up = "Tailnet 🖧: %ip (%speed)"
        format_down = "Tailnet 🖧: down"
}

ethernet enp5s0 {
        format_up = "🖧: %ip (%speed)"
        format_down = "🖧: down"
}

disk "/" {
        format = " 🖴 %free"
}

memory {
        format = "🐏 %used"
        threshold_degraded = "10%"
        format_degraded = "MEMORY: %free"
}

load {
        format = "1:%1min 5: %5min"
}

tztime local {
        format = "%Y-%m-%d %H:%M:%S %Z"
        hide_if_equals_localtime = false
}

tztime utc {
        format = "%Y-%m-%d %H:%M:%S %Z"
        timezone = "Etc/UTC"
}

read_file uptime {
        path = "/proc/uptime"
}
